name: Build Universal Release App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build Universal Release app
        run: |
          set -euo pipefail
          xcodebuild \
            -project alt-tab-macos.xcodeproj \
            -scheme Release \
            -configuration Release \
            -derivedDataPath DerivedData \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64 x86_64" \
            CURRENT_PROJECT_VERSION=11.4.3 \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Sign, verify, and package installer
        run: |
          set -euo pipefail
          APP_PATH=$(find DerivedData/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)
          test -n "$APP_PATH"

          EXECUTABLE="$APP_PATH/Contents/MacOS/AltTab"
          test -f "$EXECUTABLE"

          ARCH_LIST=$(lipo -archs "$EXECUTABLE")
          echo "Executable architectures: $ARCH_LIST"
          [[ " $ARCH_LIST " == *" arm64 "* ]]
          [[ " $ARCH_LIST " == *" x86_64 "* ]]

          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Contents/Info.plist")
          MINIMUM_OS=$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$APP_PATH/Contents/Info.plist")
          echo "App version: $VERSION"
          echo "Minimum macOS version: $MINIMUM_OS"
          [[ "$VERSION" == "11.4.3" ]]

          if strings "$EXECUTABLE" | grep -Fq 'QA Menu'; then
            echo "Release executable unexpectedly contains QA Menu" >&2
            exit 1
          fi

          codesign \
            --deep \
            --force \
            --options runtime \
            --entitlements alt_tab_macos.entitlements \
            --sign - \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          {
            echo "Configuration: Release"
            echo "Architectures: $ARCH_LIST"
            echo "Version: $VERSION"
            echo "Minimum macOS: $MINIMUM_OS"
            echo "Signature: ad-hoc with hardened runtime (local installation)"
            echo "QA Menu: excluded"
          } > BUILD-INFO.txt

          ZIP_NAME="AltTab-$VERSION-Universal-Release.zip"
          DMG_NAME="AltTab-$VERSION-Universal-Release.dmg"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"

          mkdir -p dmg-root
          ditto "$APP_PATH" dmg-root/AltTab.app
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "AltTab $VERSION" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "$DMG_NAME"

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AltTab-Universal-Release
          path: |
            AltTab-*-Universal-Release.zip
            AltTab-*-Universal-Release.dmg
            BUILD-INFO.txt

